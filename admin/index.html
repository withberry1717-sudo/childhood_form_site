<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理室 | 幼少期写真アーカイブ</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="admin-page">
    <section class="panel">
      <p class="label">管理室</p>
      <h1>投稿内容の確認</h1>
      <p class="lead">
        Googleフォームで届いた回答と、アップロードされた写真を確認するためのページです。
      </p>

      <div class="links">
        <a class="admin-link" id="openSheet" href="#">
          <span>回答スプレッドシート</span>
          <small>投稿者情報・お問い合わせ内容</small>
        </a>
        <a class="admin-link" id="openDrive" href="#">
          <span>画像保存フォルダ</span>
          <small>アップロードされた写真</small>
        </a>
        <a class="admin-link" id="openForm" href="#">
          <span>回答者用フォーム</span>
          <small>公開フォームを確認</small>
        </a>
      </div>

      <div class="memo">
        <h2>メモ</h2>
        <ul>
          <li>この管理室は公開サイトからはリンクしていません。</li>
          <li>回答と写真の管理はGoogleフォーム側で行います。</li>
          <li>リンクが開かない場合は site-config.js を確認してください。</li>
        </ul>
      </div>
    </section>
  </main>

  <script src="../site-config.js"></script>
  <script src="./admin.js"></script>
</body>
</html>
